<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANNU ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--gold:#f5c842;--gold2:#e8a000;--rose:#ff6eb4;--purple:#a855f7;--deep:#08000f;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);touch-action:none;}

.stars{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 30%,rgba(168,85,247,.18) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 70%,rgba(255,110,180,.15) 0%,transparent 60%),
             radial-gradient(ellipse at 50% 50%,#08000f 0%,#040009 100%);}
.stars::before,.stars::after{content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%,#fff 100%,transparent),
    radial-gradient(1.5px 1.5px at 35% 55%,#ffdb80 100%,transparent),
    radial-gradient(1px 1px at 60% 10%,#fff 100%,transparent),
    radial-gradient(1px 1px at 80% 80%,#fff 100%,transparent),
    radial-gradient(1px 1px at 25% 85%,#fff 100%,transparent),
    radial-gradient(1.5px 1.5px at 90% 35%,#ffd6f0 100%,transparent),
    radial-gradient(1px 1px at 50% 65%,#fff 100%,transparent),
    radial-gradient(2px 2px at 15% 45%,#ffdb80 100%,transparent),
    radial-gradient(1px 1px at 70% 25%,#fff 100%,transparent),
    radial-gradient(1px 1px at 5% 70%,#fff 100%,transparent),
    radial-gradient(1px 1px at 95% 60%,#fff 100%,transparent),
    radial-gradient(1.5px 1.5px at 42% 90%,#ffd6f0 100%,transparent);
  animation:twinkle 4s ease-in-out infinite alternate;}
.stars::after{
  background-image:
    radial-gradient(1px 1px at 20% 10%,#fff 100%,transparent),
    radial-gradient(1px 1px at 40% 40%,#fff 100%,transparent),
    radial-gradient(1.5px 1.5px at 75% 55%,#ffd6f0 100%,transparent),
    radial-gradient(1px 1px at 55% 75%,#fff 100%,transparent),
    radial-gradient(1px 1px at 85% 15%,#fff 100%,transparent),
    radial-gradient(2px 2px at 30% 60%,#ffdb80 100%,transparent),
    radial-gradient(1px 1px at 65% 85%,#fff 100%,transparent),
    radial-gradient(1px 1px at 8% 50%,#fff 100%,transparent);
  animation-delay:-2s;animation-duration:5s;}
@keyframes twinkle{0%{opacity:.4}100%{opacity:1}}

.scene{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1;}

.petal-ring{position:relative;width:290px;height:290px;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 0 28px rgba(245,200,66,.4));}
.petal{position:absolute;width:50px;height:80px;
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  opacity:.85;transform-origin:50% 145px;
  animation:petalPulse 3s ease-in-out infinite alternate;}
.petal:nth-child(1){background:linear-gradient(180deg,#ff6eb4,#ff3d9a);transform:rotate(0deg);animation-delay:0s}
.petal:nth-child(2){background:linear-gradient(180deg,#f5c842,#e8a000);transform:rotate(45deg);animation-delay:.2s}
.petal:nth-child(3){background:linear-gradient(180deg,#a855f7,#7c3aed);transform:rotate(90deg);animation-delay:.4s}
.petal:nth-child(4){background:linear-gradient(180deg,#ff6eb4,#ff3d9a);transform:rotate(135deg);animation-delay:.6s}
.petal:nth-child(5){background:linear-gradient(180deg,#f5c842,#e8a000);transform:rotate(180deg);animation-delay:.8s}
.petal:nth-child(6){background:linear-gradient(180deg,#a855f7,#7c3aed);transform:rotate(225deg);animation-delay:1s}
.petal:nth-child(7){background:linear-gradient(180deg,#ff6eb4,#ff3d9a);transform:rotate(270deg);animation-delay:1.2s}
.petal:nth-child(8){background:linear-gradient(180deg,#f5c842,#e8a000);transform:rotate(315deg);animation-delay:1.4s}
@keyframes petalPulse{0%{opacity:.7;filter:brightness(1)}100%{opacity:1;filter:brightness(1.5) saturate(1.3)}}

.dp-wrapper{position:absolute;width:192px;height:192px;cursor:pointer;user-select:none;}
.dp-ring{position:absolute;inset:-6px;border-radius:50%;
  background:conic-gradient(#f5c842,#fff8dc,#e8a000,#f5c842,#fffacd,#e8a000,#f5c842);
  animation:spinRing 4s linear infinite;z-index:2;}
.dp-ring::after{content:'';position:absolute;inset:5px;background:var(--deep);border-radius:50%;}
.dp-glow-ring{position:absolute;inset:-20px;border-radius:50%;
  border:2px solid rgba(245,200,66,.3);
  animation:glowPulse 2s ease-in-out infinite alternate;z-index:1;}
.dp-glow-ring::before{content:'';position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(255,110,180,.25);
  animation:glowPulse 2.5s ease-in-out infinite alternate-reverse;}
@keyframes spinRing{to{transform:rotate(360deg)}}
@keyframes glowPulse{0%{opacity:.3;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}

.diamond{position:absolute;width:11px;height:11px;
  background:linear-gradient(135deg,#fff,#f5c842);z-index:3;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  top:50%;left:50%;margin:-5.5px 0 0 -5.5px;
  animation:spinRing 4s linear infinite;}
.diamond:nth-child(1){transform:rotate(0deg) translateY(-104px)}
.diamond:nth-child(2){transform:rotate(60deg) translateY(-104px)}
.diamond:nth-child(3){transform:rotate(120deg) translateY(-104px)}
.diamond:nth-child(4){transform:rotate(180deg) translateY(-104px)}
.diamond:nth-child(5){transform:rotate(240deg) translateY(-104px)}
.diamond:nth-child(6){transform:rotate(300deg) translateY(-104px)}

.dp-img{position:absolute;inset:0;border-radius:50%;overflow:hidden;z-index:2;
  border:4px solid var(--deep);
  box-shadow:0 0 45px rgba(245,200,66,.35),inset 0 0 20px rgba(0,0,0,.4);
  transition:transform .15s;}
.dp-img img{width:100%;height:100%;object-fit:cover;display:block;}
.dp-wrapper:active .dp-img{transform:scale(.92);}
.dp-img::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 50%,rgba(255,255,255,.04) 100%);
  border-radius:50%;pointer-events:none;}

.name-tag{margin-top:24px;text-align:center;z-index:2;}
.name-main{font-family:'Cinzel Decorative',serif;
  font-size:clamp(30px,9vw,50px);font-weight:700;
  background:linear-gradient(90deg,#f5c842 0%,#fff8c0 30%,#f5c842 50%,#e8a000 70%,#fff8c0 85%,#f5c842 100%);
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmerText 3s linear infinite;letter-spacing:8px;
  filter:drop-shadow(0 0 14px rgba(245,200,66,.65));}
@keyframes shimmerText{0%{background-position:200% center}100%{background-position:-200% center}}
.name-sub{font-family:'Dancing Script',cursive;font-size:clamp(13px,4vw,18px);
  color:rgba(255,110,180,.9);letter-spacing:3px;margin-top:5px;
  animation:fadeFloat 3s ease-in-out infinite alternate;}
.name-deco{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:7px;}
.name-deco span{display:block;height:1px;width:65px;
  background:linear-gradient(90deg,transparent,#f5c842,transparent);}
.name-deco em{font-style:normal;color:var(--rose);font-size:15px;
  animation:heartbeat 1.2s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
@keyframes fadeFloat{0%{opacity:.6;transform:translateY(0)}100%{opacity:1;transform:translateY(-4px)}}

.hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  font-family:'Dancing Script',cursive;font-size:16px;
  color:rgba(255,255,255,.45);letter-spacing:2px;z-index:5;
  animation:fadeFloat 2s ease-in-out infinite alternate;white-space:nowrap;}

/* Burst DPs */
.burst-dp{position:fixed;width:65px;height:65px;border-radius:50%;overflow:hidden;
  pointer-events:none;z-index:20;
  border:2.5px solid var(--gold);
  box-shadow:0 0 16px var(--gold),0 0 32px rgba(245,200,66,.35);
  animation:burstFly var(--dur,1.2s) cubic-bezier(.22,.61,.36,1) forwards;}
.burst-dp img{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes burstFly{
  0%  {transform:translate(0,0) scale(.15) rotate(0deg);opacity:1}
  65% {opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(1) rotate(var(--rot));opacity:0}}

.sparkle{position:fixed;width:var(--sz,8px);height:var(--sz,8px);border-radius:50%;
  background:var(--clr,#f5c842);pointer-events:none;z-index:21;
  box-shadow:0 0 6px var(--clr,#f5c842);
  animation:sparkleFly var(--dur,.8s) ease-out forwards;}
@keyframes sparkleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

.ripple{position:fixed;width:10px;height:10px;border-radius:50%;
  border:2.5px solid var(--gold);pointer-events:none;z-index:19;
  animation:rippleOut .8s ease-out forwards;}
@keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(1);opacity:.9}100%{transform:translate(-50%,-50%) scale(22);opacity:0}}

.float-heart{position:fixed;pointer-events:none;z-index:22;
  font-size:var(--sz,20px);
  animation:floatUp var(--dur,2s) ease-out forwards;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-200px) scale(.3);opacity:0}}
</style>
</head>

let ctx;
function getCtx(){
  if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
  return ctx;
}
function playChime(freq,type,dur){
  const c=getCtx();
  const osc=c.createOscillator(),gain=c.createGain();
  osc.connect(gain);gain.connect(c.destination);
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,c.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq*1.6,c.currentTime+dur*.35);
  gain.gain.setValueAtTime(.17,c.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
  osc.start(c.currentTime);osc.stop(c.currentTime+dur);
}
function playBurst(){
  [523.25,659.25,783.99,1046.5].forEach((n,i)=>setTimeout(()=>playChime(n,'sine',.5),i*75));
}

const colors=['#f5c842','#ff6eb4','#a855f7','#ffffff','#ff3d9a','#e8a000','#fff8c0'];
const emojis=['♥','✨','💖','🌸','💫','⭐','💕','🌟'];

function spawnRipple(x,y){
  const el=document.createElement('div');
  el.className='ripple';el.style.left=x+'px';el.style.top=y+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function spawnSparkles(x,y){
  for(let i=0;i<24;i++){
    const el=document.createElement('div');el.className='sparkle';
    const angle=Math.random()*Math.PI*2,dist=45+Math.random()*130;
    el.style.cssText=`left:${x}px;top:${y}px;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
      --sz:${4+Math.random()*11}px;
      --clr:${colors[Math.floor(Math.random()*colors.length)]};
      --dur:${.5+Math.random()*.7}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
  }
}

function spawnBurstDPs(x,y){
  for(let i=0;i<14;i++){
    const el=document.createElement('div');el.className='burst-dp';
    const angle=(i/14)*Math.PI*2+(Math.random()-.5)*.35;
    const dist=100+Math.random()*150;
    el.style.cssText=`
      left:${x-32}px;top:${y-32}px;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      --dur:${.9+Math.random()*.7}s;
      --rot:${(Math.random()-.5)*680}deg;`;
    const img=document.createElement('img');
    img.src=IMG_SRC;img.alt='ANNU';
    el.appendChild(img);
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  }
}

function spawnHearts(x,y){
  for(let i=0;i<7;i++){
    const el=document.createElement('div');el.className='float-heart';
    el.style.cssText=`
      left:${x+(Math.random()-.5)*100}px;top:${y}px;
      --sz:${16+Math.random()*16}px;
      --dur:${1.6+Math.random()*1.2}s;`;
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
  }
}

// Idle ambient sparkles around DP
setInterval(()=>{
  const rect=document.getElementById('dpMain').getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const angle=Math.random()*Math.PI*2,r=rect.width*.54;
  const el=document.createElement('div');el.className='sparkle';
  el.style.cssText=`
    left:${cx+Math.cos(angle)*r}px;top:${cy+Math.sin(angle)*r}px;
    --tx:${(Math.random()-.5)*28}px;--ty:${(Math.random()-.5)*28}px;
    --sz:${3+Math.random()*6}px;
    --clr:${colors[Math.floor(Math.random()*colors.length)]};
    --dur:${.8+Math.random()*.7}s;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
},360);

const dp=document.getElementById('dpMain');
let lastTap=0;
function onTap(e){
  e.preventDefault();
  const now=Date.now();if(now-lastTap<250)return;lastTap=now;
  const rect=dp.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  spawnRipple(cx,cy);
  spawnSparkles(cx,cy);
  spawnBurstDPs(cx,cy);
  spawnHearts(cx,cy);
  playBurst();
  setTimeout(()=>playChime(1500,'sine',.18),360);
}
dp.addEventListener('touchstart',onTap,{passive:false});
dp.addEventListener('click',onTap);
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
</body>
